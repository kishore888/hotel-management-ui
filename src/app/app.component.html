<mat-toolbar>
  <h3>Hotel Service</h3>
  <button mat-icon-button aria-label="Menu icon" (click)="toggleMenu()">
    <mat-icon>menu</mat-icon>
  </button>
  
  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="navigateToProfile()">Profile</button>
    <button mat-menu-item (click)="logout()">Logout</button>
  </mat-menu>
</mat-toolbar>

<mat-sidenav-container autosize>
  <!-- <mat-sidenav [opened]="true" mode="side"> -->
  <!-- <mat-sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="isMobile ? 'false' : 'true'"> -->
  <mat-sidenav [ngClass]="!isCollapsed ? 'expanded' : ''" [mode]="isMobile ? 'over' : 'side'" [opened]="isMobile ? 'false' : 'true'">
    <mat-nav-list>
      
      <a mat-list-item>
        <span class="entry">
            <mat-icon>house</mat-icon>
            <span *ngIf="isCollapsed">Dashboard</span>
        </span>
      </a>
      <a mat-list-item routerLink="room" routerLinkActive="active">
        <span class="entry">
            <mat-icon>house</mat-icon>
            <span *ngIf="isCollapsed">Rooms</span>
        </span>

        <a mat-nav-list>
          <a mat-list-item routerLink="addRoom" routerLinkActive="active">
            <span class="entry">
              <mat-icon>house</mat-icon>
              <span *ngIf="isCollapsed">Add Room</span>
            </span>
          </a>
          <a mat-list-item routerLink="employee" >
            <span class="entry">
              <mat-icon>house</mat-icon>
              <span *ngIf="isCollapsed">Employee</span>
            </span>
          </a>
        </a>

      </a>
      <a mat-list-item routerLink="addRoom" routerLinkActive="active">
        <span class="entry">
            <mat-icon>house</mat-icon>
            <span *ngIf="isCollapsed">Add Room</span>
        </span>
      </a>
      <a mat-list-item routerLink="employee" routerLinkActive="active">
        <span class="entry">
            <mat-icon>house</mat-icon>
            <span *ngIf="isCollapsed">Employee</span>
        </span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <!-- <h2>Content</h2> -->
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
