<div class="content-wrapper">
    <section class="content">
<!-- left column -->
<!--         <div class="col-md-12"> -->
          <!-- general form elements -->
          <div class="box box-primary">
            <div class="box-header with-border">
              <h3 class="box-title">Room Type</h3>
            </div>
            <!-- /.box-header -->
            <!-- form start -->
            <!-- <form role="form" id="" name="" action="${pageContext.request.contextPath}/roomType/create" method="POST"> -->
            <form #roomTypeForm="ngForm" (ngSubmit)="onSubmit(roomTypeForm)">
              <div class="box-body">
                <div class="row">
                    <div class="form-group col-lg-4 col-md-4 col-sm-4">
                    <label for="roomType">Room Type Name</label>
                    <input type="text" class="form-control" id="roomType" name="roomType" placeholder="Room Type">
                    </div>
                    <div class="form-group col-lg-4 col-md-4 col-sm-4">
                    <label for="tariff">Tariff</label>
                    <input type="text" class="form-control" id="tariff" name="roomTypeTariff" placeholder="Tariff">
                    </div>
                    <div class="form-group col-lg-4 col-md-4 col-sm-4">
                    <label for="status">Status</label>
                    <input type="text" class="form-control" id="status" name="roomTypeStatus" placeholder="Status">
                    </div>
                </div>
              </div>
              <!-- /.box-body -->

              <div class="box-footer">
<!--                 <button type="submit" class="btn btn-primary">Submit</button> -->
                <input type="submit" class="btn btn-primary" value="Submit">
                <input type="button" class="btn btn-warning" value="Back" onclick="history.go(-1);"/>
              </div>
            </form>
          </div>
          <!-- /.box -->
          
<!--           </div> -->

          <!-- general form elements -->

	                </thead>
	                <tbody>

			                <tr *ngFor="let roomType of roomTypeList; let count = index">
			                  <td>{{count}}</td>

			                  <td>{{roomType.roomTypeTariff}}</td>
                              <td>{{roomType.roomTypeStatus}}</td>
			                  <td>

                          <!-- <button type="button" (click)="openBookingRoom(content)" class="btn btn-success" id="open-book-modal">Book</button>   -->
                           
			                    <!-- <a href="reservation/bookRoom?roomIds=${room.roomId}" role="button" class="btn btn-warning">Book</a>
			                    <a href="room/create?roomId=${room.roomId}" role="button" class="btn btn-success"><i class="fa fa-edit"></i></a> 
			                  	<button type="button" (click)="bookingRoom($event)" class="btn btn-success" data-role="button" data-toggle="modal" data-target="#paymentModel" 
			                  	 id="book-button" data-roomId="{{room.roomId}}" data-roomno="{{room.roomNumber}}" data-roomcharges="{{room.roomCharges}}">Book</button>  -->
                           <!-- <button type="button" (click)="bookingRoom($event)" class="btn btn-success" data-role="button" data-toggle="modal" data-target="#paymentModel" 
			                  	 id="book-button" data-roomId="{{room.roomId}}" data-roomno="{{room.roomNumber}}" data-roomcharges="{{room.roomCharges}}">Book</button>  -->
			                  
			                  </td>
			                </tr>
		                <!-- </c:forEach> -->
		            </tbody>
		        </table>

              </div>
              <!-- /.box-body -->

              <div class="box-footer">
                <input type="button" class="btn btn-warning" value="Back" onclick="history.go(-1);"/>

          </div>

<!-- Modal -->
  <div class="modal fade" id="importRoomsExcel" role="dialog" tabindex="-1" aria-labelledby="Import Rooms Excel" aria-hidden="true">
    <div class="modal-dialog">
    
      <!-- Modal content-->
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal">&times;</button>
          <h4 class="modal-title">Import Rooms Excel</h4>
        </div>
        <div class="modal-body">
          <p>Some text in the modal.</p>
          
          
          
          
        </div>

          <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>

    </div>
